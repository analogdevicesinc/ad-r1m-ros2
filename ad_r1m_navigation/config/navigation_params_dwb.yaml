#-----------------------------------------------------------------------------
# Controller server parameters
#-----------------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.5
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 15.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.1 # 10 cm
      yaw_goal_tolerance: 0.15 # ~8.6 degrees

    # DWB parameters
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.2
      max_vel_y: 0.0
      max_vel_theta: 0.8
      min_speed_xy: 0.0
      max_speed_xy: 0.2
      min_speed_theta: -0.6
      acc_lim_x: 0.2
      acc_lim_y: 0.0
      acc_lim_theta: 0.6
      decel_lim_x: -0.2
      decel_lim_y: 0.0
      decel_lim_theta: -0.6
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 2.0
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.15
      trans_stopped_velocity: 0.2
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      
      # Critic scaling parameters - balance between different trajectory evaluation criteria
      BaseObstacle.scale: 0.02          # Low weight allows closer approach to obstacles for tight spaces
      PathAlign.scale: 32.0             # High weight ensures robot follows planned path closely
      PathAlign.forward_point_distance: 0.1  # Short lookahead for responsive path tracking
      GoalAlign.scale: 60.0             # Highest weight prioritizes goal orientation alignment
      GoalAlign.forward_point_distance: 0.15  # Moderate lookahead for smooth goal approach
      PathDist.scale: 32.0              # High weight keeps robot close to global path
      GoalDist.scale: 24.0              # Moderate weight balances goal seeking with path following
      RotateToGoal.scale: 80.0          # Very high weight for final rotation to goal orientation
      RotateToGoal.xy_goal_tolerance: 0.15    # tolerance before starting final rotation
      RotateToGoal.slowing_factor: 1.0  # No speed reduction during rotation maneuver
      RotateToGoal.trans_stopped_velocity: 0.15  # Consider robot stopped at 15cm/s for rotation
      RotateToGoal.lookahead_time: 1.0  # prediction horizon for rotation planning

#-----------------------------------------------------------------------------
# Costmap parameters: local and global
#-----------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.35
      footprint: "[ [0.30, -0.15], [-0.30, -0.15], [-0.30, 0.15], [0.30, 0.15] ]"
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.15
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      footprint: "[ [0.30, -0.19], [-0.30, -0.19], [-0.30 0.19], [0.30, 0.19] ]" # updated footprint
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.3
          obstacle_max_range: 2.5
          obstacle_min_range: 0.3
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.05
      always_send_full_costmap: True

#-----------------------------------------------------------------------------
# Planner parameters
#-----------------------------------------------------------------------------
planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true
      use_final_approach_orientation: true

#-----------------------------------------------------------------------------
# Behavior server parameters
#-----------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
      spin_dist: 0.0
    backup:
      plugin: "nav2_behaviors/BackUp"
      distance: 0.1
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
      wait_duration: 1.0
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.2
    use_sim_time: False
    simulate_ahead_time: 1.5
    max_rotational_vel: 0.8
    min_rotational_vel: 0.2
    rotational_acc_lim: 0.8
