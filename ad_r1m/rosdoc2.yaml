## This 'attic section' self-documents this file's type and version.
type: 'rosdoc2 config'
version: 1

---

settings:
    ## If this is true, a standard index page is generated in the output directory.
    ## If false, you can include content that would have been in the index
    ## into one of your '.rst' files from your Sphinx project.
    generate_package_index: false

    ## This setting, if true, attempts to run `doxygen` and the `breathe`/`exhale`
    ## extensions to `sphinx` regardless of build type.
    always_run_doxygen: false
    enable_breathe: false
    enable_exhale: false

    ## This setting, if true, attempts to run `sphinx-apidoc` regardless of build type.
    always_run_sphinx_apidoc: false

    # This setting, if provided, will override the build_type of this package
    # for documentation purposes only. If not provided, documentation will be
    # generated assuming the build_type in package.xml.
    override_build_type: 'ament_python'
    # Lie to rosdoc2, say your source is in doc folder
    python_source: 'doc'

builders:
    - sphinx: {
        # Supported keys for the builder_entry_dictionary include:
        #
        # - name (str) (required)
        #   - name of the documentation, used in reference to the content generated by this builder
        # - builder (str) (required)
        #   - required for all builders, must be 'sphinx' to use this class
        # - sphinx_sourcedir (str) (optional)
        #   - directory containing the Sphinx project, i.e. the `conf.py`, the setting
        #     you would pass to sphinx-build as SOURCEDIR. Defaults to `doc`.
        #
        name: 'ad_r1m',
        ## If sphinx_sourcedir is specified and not null, then the documentation in that folder
        ## (specified relative to the package.xml directory) will replace rosdoc2's normal output.
        sphinx_sourcedir: 'doc',
        output_dir: '',
    }
