name: Generate documentation
on:
    push:
      branches:
        - main
      tags:
        - "*.*.*"
    pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-doc:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.head_ref }}
        persist-credentials: false
        token: ${{ env.GH_TOKEN }}
        lfs: true

    - name: Set up Python3 environment
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.x"

    - name: Install pip packages
      working-directory: ad_r1m/doc
      run: |
        pip install pip --upgrade
        pip install -r requirements.txt

    - name: Build doc
      working-directory: ci
      run: |
        export ADOC_DOC_VERSION=${{ github.ref_name }}
        export DOC_REPOSITORY=adrd_demo_ros2
        ./build_doc.sh

    - name: Store the generated doc
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: html
        path: _build/docs_output/ad_r1m
  
  # Similar to https://github.com/analogdevicesinc/documentation/blob/main/.github/workflows/top-level.yml
  check-doc:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read
      pull-requests: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Check git lfs
      run: |
        git lfs install --skip-smudge --force

        _emit_fmt() {
          msg=$(echo "$1" | tr -d '\t')
          msg=$(printf "$msg" | sed ':a;N;$!ba;s/\n/'%0A'/g')
          printf "%s\n" "$msg"
          exit 1
        }

        lfs_error="
        At least one file should have been an LFS pointer, but is not.
        Please ensure that binary data was committed to git lfs, a tutorial is provided at:
        https://analogdevicesinc.github.io/documentation/contributing/creating_new_pages.html#adding-images-and-other-binary-files"

        git ls-files \
          | parallel -j "$(nproc)" --halt never '
            if git check-attr filter -- {} | grep -q "lfs$"; then
              line=$(git show :{} | head -n 1)
              if [ "$line" != "version https://git-lfs.github.com/spec/v1" ]; then
                echo "::error file={}::File should have been an LFS pointer, but is not"
                exit 1
              fi
            fi
          ' || _emit_fmt "::warning ::check_lfs: $lfs_error"

  deploy:
    runs-on: ubuntu-latest
    needs: [build-doc]
    concurrency:
      group: gh-pages
    permissions:
      contents: write
      pull-requests: read
    if: >
      github.ref == 'refs/heads/main' ||
      github.event_name == 'pull_request' ||
      github.ref_type == 'tag'

    steps:
    - uses: analogdevicesinc/doctools/gh-pages-deploy@7ab0f7720d5ffdf16e3d89005858e26a652d032d #@action
      with:
        new_tag: ${{ github.ref_type == 'tag' }}
        tag: ${{ github.ref_name }}
        name: html
        gh-token: ${{ secrets.GITHUB_TOKEN }}
